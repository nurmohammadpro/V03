<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/v03.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>v03.tech - AI App Builder</title>
    <script>
      (() => {
        const storageKey = "v03-ui-theme";
        const saved = localStorage.getItem(storageKey) || "dark";
        const resolved =
          saved === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : saved;

        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(resolved);
        document.documentElement.style.backgroundColor = resolved === "dark" ? "#06080c" : "#f4f7fb";
      })();
    </script>
  </head>
  <body style="background:#06080c;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
